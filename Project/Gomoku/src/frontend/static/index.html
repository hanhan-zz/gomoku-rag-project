<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gomoku - Human vs AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gomoku - Human vs AI</h1>
            <p class="subtitle">五子棋 - 你执黑棋先行</p>
            <div class="status-container">
                <div id="status" class="status your-turn">你的回合</div>
            </div>
            <div class="score-panel">
                <span class="player-score"><span class="piece black"></span> 你 (黑)</span>
                <span class="vs">VS</span>
                <span class="player-score"><span class="piece white"></span> AI (白)</span>
            </div>
        </header>

        <div class="layout">
            <div class="board-section">
                <canvas id="gameCanvas" width="600" height="600"></canvas>
                <div class="board-controls">
                    <button id="newGameBtn" class="btn btn-primary">新游戏</button>
                    <button id="undoBtn" class="btn btn-secondary">悔棋</button>
                </div>
            </div>

            <div class="side-panels">
                <div class="panel qa-panel">
                    <div class="panel-header qa-header">
                        <h3>Move QA (落子问答)</h3>
                    </div>
                    <div class="panel-body">
                        <p>询问某一步为什么这样下：</p>
                        <div class="input-group">
                            <input type="text" id="whyInput" placeholder="例如：为什么AI下在这里？">
                            <button id="whyBtn" class="btn btn-ask">Ask</button>
                        </div>
                        <div id="explainPanel" class="result-box">
                            <p class="placeholder-text">回答将显示在这里...</p>
                            <ul>
                                <li>落子原因</li>
                                <li>可选替代点</li>
                                <li>相关策略依据</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="panel review-panel">
                    <div class="panel-header review-header">
                        <h3>Post-game Review (棋局复盘)</h3>
                    </div>
                    <div class="panel-body">
                        <div class="review-actions">
                            <button id="reviewBtn" class="btn btn-primary">Generate Review</button>
                            <button id="downloadBtn" class="btn btn-secondary" style="display: none;">Download Report</button>
                        </div>
                        
                        <!-- Win Rate Chart Container -->
                        <div id="winRateContainer" style="display: none; margin-top: 15px;">
                            <canvas id="winRateChart"></canvas>
                        </div>

                        <div id="reviewPanel" class="result-box">
                            <p class="placeholder-text">复盘结果将显示在这里...</p>
                            <ul>
                                <li>本局总结</li>
                                <li>关键转折点</li>
                                <li>失误分析</li>
                                <li>改进建议</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/game.js"></script>
</body>
</html>
