services:
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "9898:9898"
    environment:
      - LLM_API_URL=http://host.docker.internal:8000/v1
    volumes:
      - ./src/frontend:/app
    command: uvicorn app:app --host 0.0.0.0 --port 9898 --reload

