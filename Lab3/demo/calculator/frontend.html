<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator Demo </title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Calculator</h1>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Number A</label>
        <input id="numA" type="number" step="any" placeholder="Enter first number"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Number B</label>
        <input id="numB" type="number" step="any" placeholder="Enter second number"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div class="flex gap-2">
        <button onclick="calculate('+')" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition">+</button>
        <button onclick="calculate('-')" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition">-</button>
        <button onclick="calculate('*')" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition">*</button>
        <button onclick="calculate('/')" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition">/</button>
      </div>
    </div>

    <div id="result" class="mt-6 text-center text-xl font-bold text-gray-700 min-h-[40px]"></div>
  </div>

  <script>
    async function calculate(op) {
      const numA = document.getElementById('numA').value;
      const numB = document.getElementById('numB').value;
      const resultDiv = document.getElementById('result');

      if (numA === '' || numB === '') {
        resultDiv.textContent = 'Please enter both numbers.';
        resultDiv.className = 'mt-6 text-center text-xl font-bold text-red-500 min-h-[40px]';
        return;
      }

      resultDiv.textContent = 'Calculating...';
      resultDiv.className = 'mt-6 text-center text-xl font-bold text-gray-500 min-h-[40px]';

      try {
        // JS runs in the user's browser on the host, not inside the frontend container.
        // Publish backend as -p 6060:6060 so localhost:6060 reaches the API.
        const response = await fetch(`http://${window.location.hostname}:6060/calculate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ a: parseFloat(numA), b: parseFloat(numB), op })
        });
        const data = await response.json();
        resultDiv.textContent = 'Result: ' + data.result;
        resultDiv.className = 'mt-6 text-center text-xl font-bold text-green-600 min-h-[40px]';
      } catch (err) {
        resultDiv.textContent = 'Error: could not reach backend.';
        resultDiv.className = 'mt-6 text-center text-xl font-bold text-red-500 min-h-[40px]';
      }
    }
  </script>

</body>
</html>
